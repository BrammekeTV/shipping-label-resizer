<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shipping Label Resizer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ── Theme tokens ─────────────────────────────────────────────── */
    :root {
      --bg:              #f1f5f9;
      --surface:         #ffffff;
      --surface-muted:   #f8fafc;
      --border:          #e2e8f0;
      --border-strong:   #cbd5e1;
      --text:            #0f172a;
      --text-muted:      #64748b;
      --text-subtle:     #94a3b8;
      --primary:         #0f766e;
      --primary-hover:   #0d6660;
      --primary-fg:      #ffffff;
      --danger:          #b91c1c;
      --success:         #15803d;
      --warning:         #b45309;
      --sel-bg:          #f0fdfa;
      --sel-border:      #0f766e;
      --progress-track:  #e2e8f0;
      --progress-fill:   #0f766e;
    }
    [data-theme="dark"] {
      --bg:              #0d1117;
      --surface:         #161b22;
      --surface-muted:   #0d1117;
      --border:          #30363d;
      --border-strong:   #484f58;
      --text:            #c9d1d9;
      --text-muted:      #8b949e;
      --text-subtle:     #6e7681;
      --primary:         #3fb950;
      --primary-hover:   #2ea043;
      --primary-fg:      #ffffff;
      --danger:          #f85149;
      --success:         #3fb950;
      --warning:         #d29922;
      --sel-bg:          #122620;
      --sel-border:      #3fb950;
      --progress-track:  #21262d;
      --progress-fill:   #3fb950;
    }

    /* ── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Page header ─────────────────────────────────────────────── */
    .page-header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .page-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .page-sub {
      font-size: 12px;
      color: var(--text-muted);
    }
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px 9px;
      font-size: 13px;
      line-height: 1.4;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-btn:hover {
      border-color: var(--border-strong);
      color: var(--text);
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    .page-main {
      max-width: 620px;
      margin: 0 auto;
      padding: 24px 16px 56px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    /* ── Divider ─────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* ── Drop zone ───────────────────────────────────────────────── */
    .drop-zone {
      border: 1px dashed var(--border-strong);
      border-radius: 6px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface-muted);
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--primary);
      background: var(--sel-bg);
    }
    .drop-zone-icon {
      color: var(--text-subtle);
      margin-bottom: 8px;
    }
    .drop-zone p {
      color: var(--text-muted);
      font-size: 13px;
    }
    .drop-zone .link {
      color: var(--primary);
      font-weight: 500;
    }
    .drop-zone .sub {
      font-size: 12px;
      color: var(--text-subtle);
      margin-top: 4px;
    }
    #file-input { display: none; }

    /* ── File list ───────────────────────────────────────────────── */
    .file-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .file-list-header span {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .clear-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-subtle);
      padding: 0;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }

    .file-list { display: flex; flex-direction: column; gap: 4px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
    }
    .file-item .fi-icon { flex-shrink: 0; color: var(--text-subtle); }
    .file-item .fi-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .fi-size { color: var(--text-subtle); font-size: 11px; flex-shrink: 0; }
    .file-item .fi-status { font-size: 11px; font-weight: 500; flex-shrink: 0; min-width: 50px; text-align: right; }
    .fi-status.pending { color: var(--text-subtle); }
    .fi-status.working { color: var(--warning); }
    .fi-status.done    { color: var(--success); }
    .fi-status.error   { color: var(--danger); }
    .file-item .fi-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-subtle);
      font-size: 13px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .file-item .fi-remove:hover { color: var(--danger); }

    /* ── Section label ───────────────────────────────────────────── */
    .section-label {
      font-weight: 500;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 10px;
    }

    /* ── Label size options ──────────────────────────────────────── */
    .label-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .label-option {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
    }
    .label-option:hover { border-color: var(--border-strong); }
    .label-option input[type="radio"] { display: none; }
    .label-option.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
    }
    .label-option .size-name { font-weight: 600; font-size: 13px; color: var(--text); }
    .label-option .size-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Options row ─────────────────────────────────────────────── */
    .options-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      user-select: none;
    }
    .toggle-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    .padding-control {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      font-size: 13px;
      color: var(--text-muted);
    }
    .padding-control input[type="range"] { width: 80px; accent-color: var(--primary); }
    .padding-val { font-weight: 600; color: var(--text); font-size: 12px; min-width: 32px; }

    /* ── Sensitivity ─────────────────────────────────────────────── */
    .sensitivity-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .sensitivity-row > label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .sens-options { display: flex; gap: 4px; flex-wrap: wrap; }
    .sens-opt {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      color: var(--text-muted);
      background: var(--surface);
    }
    .sens-opt:hover { border-color: var(--border-strong); color: var(--text); }
    .sens-opt.selected {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      color: var(--text);
    }
    .sens-opt input { display: none; }
    .hint-text {
      font-size: 12px;
      color: var(--text-subtle);
      margin-top: 8px;
      min-height: 16px;
    }

    /* ── Primary button ──────────────────────────────────────────── */
    .btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 9px 16px;
      background: var(--primary);
      color: var(--primary-fg);
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Progress bar ────────────────────────────────────────────── */
    .progress-wrap { margin-top: 12px; display: none; }
    .progress-wrap.active { display: block; }
    .progress-bar-bg {
      background: var(--progress-track);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--progress-fill);
      border-radius: 2px;
      transition: width 0.2s;
      width: 0%;
    }
    .progress-label { font-size: 11px; color: var(--text-subtle); margin-top: 4px; }

    .status { font-size: 13px; margin-top: 10px; min-height: 18px; }
    .status-ok  { color: var(--success); }
    .status-err { color: var(--danger); }

    /* ── Results ─────────────────────────────────────────────────── */
    .preview-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
    .preview-tab {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-muted);
      background: var(--surface);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .preview-tab:hover { border-color: var(--border-strong); color: var(--text); }
    .preview-tab.active {
      border-color: var(--sel-border);
      background: var(--sel-bg);
      color: var(--text);
    }
    .preview-wrapper {
      display: flex;
      justify-content: center;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    #preview-canvas {
      max-width: 100%;
      max-height: 380px;
      object-fit: contain;
      border: 1px solid var(--border);
    }
    .preview-info {
      font-size: 12px;
      color: var(--text-subtle);
      text-align: center;
      margin-top: 8px;
    }

    /* ── Download buttons ────────────────────────────────────────── */
    .dl-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .dl-btn {
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: center;
    }
    .dl-btn.combined {
      background: var(--primary);
      color: var(--primary-fg);
      border: 1px solid transparent;
    }
    .dl-btn.combined:hover { background: var(--primary-hover); }
    .dl-btn.separate {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .dl-btn.separate:hover { border-color: var(--border-strong); background: var(--surface-muted); }
    .dl-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .dl-btn-single {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 8px 12px;
      background: var(--primary);
      color: var(--primary-fg);
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dl-btn-single:hover { background: var(--primary-hover); }

    @media (max-width: 480px) {
      .dl-row { grid-template-columns: 1fr; }
      .label-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <div class="page-header-left">
    <span class="page-title">Shipping Label Resizer</span>
    <span class="page-sub">100% in-browser</span>
  </div>
  <button class="theme-btn" id="theme-toggle" title="Toggle theme">
    <span id="theme-icon">☾</span>
  </button>
</header>

<main class="page-main">

<div class="card">

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-zone-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
    </div>
    <p><span class="link">Click to upload</span> or drag &amp; drop PDFs</p>
    <p class="sub">Multiple files · Vinted, Vinted GO, PostNL, bpost, DPD, GLS, …</p>
  </div>
  <input type="file" id="file-input" accept=".pdf,application/pdf" multiple />

  <!-- File list -->
  <div id="file-list-wrap" style="display:none">
    <hr class="divider">
    <div class="file-list-header">
      <span id="file-count-label">0 files</span>
      <button class="clear-btn" onclick="clearFiles()">Clear all</button>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>

  <hr class="divider">

  <!-- Label size -->
  <div class="section-label">Target label size</div>
  <div class="label-options">
    <label class="label-option selected" id="opt-4x6">
      <input type="radio" name="size" value="4x6" checked />
      <span class="size-name">4 × 6 in</span>
      <span class="size-desc">101.6 × 152.4 mm — standard thermal</span>
    </label>
    <label class="label-option" id="opt-29x90">
      <input type="radio" name="size" value="29x90" />
      <span class="size-name">29 × 90 mm</span>
      <span class="size-desc">Brother DK tape / narrow roll</span>
    </label>
    <label class="label-option" id="opt-62x100">
      <input type="radio" name="size" value="62x100" />
      <span class="size-name">62 × 100 mm</span>
      <span class="size-desc">Brother DK / medium label</span>
    </label>
    <label class="label-option" id="opt-a6">
      <input type="radio" name="size" value="a6" />
      <span class="size-name">A6</span>
      <span class="size-desc">105 × 148 mm — inkjet friendly</span>
    </label>
  </div>

  <hr class="divider">

  <!-- Options -->
  <div class="section-label">Options</div>
  <div class="options-row">
    <label class="toggle-label">
      <input type="checkbox" id="chk-rotate" checked />
      Auto-rotate to best fit
    </label>
    <div class="padding-control">
      <span>Padding</span>
      <input type="range" id="padding-range" min="0" max="10" value="2" step="1" />
      <span class="padding-val" id="padding-val">2 mm</span>
    </div>
  </div>
  <div class="sensitivity-row">
    <label>Crop:</label>
    <div class="sens-options">
      <label class="sens-opt" id="sens-normal">
        <input type="radio" name="sensitivity" value="normal" />Normal
      </label>
      <label class="sens-opt selected" id="sens-aggressive">
        <input type="radio" name="sensitivity" value="aggressive" checked />Aggressive
      </label>
      <label class="sens-opt" id="sens-conservative">
        <input type="radio" name="sensitivity" value="conservative" />Conservative
      </label>
    </div>
  </div>
  <p class="hint-text" id="sens-hint">Aggressive: best for Vinted GO — detects bordered box even with large blank space below.</p>

  <button class="btn" id="process-btn" disabled>Generate Labels</button>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">Processing…</div>
  </div>
  <div class="status" id="status"></div>
</div>

<!-- Results -->
<div class="card" id="results-section" style="display:none">
  <div class="section-label" style="margin-bottom:12px">Results</div>
  <div class="preview-tabs" id="preview-tabs"></div>
  <div class="preview-wrapper">
    <canvas id="preview-canvas"></canvas>
  </div>
  <div class="preview-info" id="preview-info"></div>

  <!-- Single file: one button. Multi file: two buttons. -->
  <div id="dl-single-wrap" style="display:none">
    <button class="dl-btn-single" id="dl-single-btn">Download PDF</button>
  </div>
  <div id="dl-multi-wrap" style="display:none">
    <div class="dl-row">
      <button class="dl-btn combined" id="dl-combined-btn">Combined PDF</button>
      <button class="dl-btn separate" id="dl-separate-btn">Separate ZIPs</button>
    </div>
  </div>
</div>

</main>

<script>
// ── Theme toggle ──────────────────────────────────────────────────────────────
(function () {
  const html = document.documentElement;
  const btn  = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    icon.textContent = theme === 'dark' ? '☀' : '☾';
    try { localStorage.setItem('theme', theme); } catch (_) {}
  }

  const saved = (function () {
    try { return localStorage.getItem('theme'); } catch (_) { return null; }
  })();
  applyTheme(saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

  btn.addEventListener('click', () => {
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
})();

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const LABEL_SIZES = {
  '4x6':    { w: 101.6, h: 152.4 },
  '29x90':  { w: 29,    h: 90    },
  '62x100': { w: 62,    h: 100   },
  'a6':     { w: 105,   h: 148   },
};
const SENSITIVITY = {
  normal:       { threshold: 230, expandPx: 4 },
  aggressive:   { threshold: 200, expandPx: 8 },
  conservative: { threshold: 245, expandPx: 2 },
};
const HINTS = {
  normal:       'Normal: good for most standard shipping labels.',
  aggressive:   'Aggressive: best for Vinted GO — detects bordered box even with large blank space below.',
  conservative: 'Conservative: keeps more whitespace — good for labels with very light borders.',
};
const RENDER_SCALE = 4;
const PX_PER_MM    = 300 / 25.4;

const $ = id => document.getElementById(id);
const setStatus = (msg, isErr = false) => {
  const el = $('status');
  el.textContent = msg;
  el.className = 'status' + (msg ? (isErr ? ' status-err' : ' status-ok') : '');
};

// ── File management ──────────────────────────────────────────────────────────
let fileQueue = []; // [{ file, id, statusEl }]
let results   = []; // [{ name, blob, canvas, info }]
let idCounter = 0;

function handleFiles(newFiles) {
  for (const f of newFiles) {
    if (!f || f.type !== 'application/pdf') continue;
    const id = ++idCounter;
    fileQueue.push({ file: f, id });
    addFileRow(f, id);
  }
  refreshUI();
}

function addFileRow(file, id) {
  const wrap = $('file-list-wrap');
  wrap.style.display = 'block';
  const list = $('file-list');
  const row  = document.createElement('div');
  row.className = 'file-item';
  row.id = 'frow-' + id;
  const sizeMB = (file.size / 1024).toFixed(0) + ' KB';
  row.innerHTML = `
    <span class="fi-icon">📄</span>
    <span class="fi-name" title="${file.name}">${file.name}</span>
    <span class="fi-size">${sizeMB}</span>
    <span class="fi-status pending" id="fstatus-${id}">Pending</span>
    <button class="fi-remove" title="Remove" onclick="removeFile(${id})">✕</button>`;
  list.appendChild(row);
  refreshFileCount();
}

function removeFile(id) {
  fileQueue = fileQueue.filter(f => f.id !== id);
  const row = $('frow-' + id);
  if (row) row.remove();
  refreshUI();
  refreshFileCount();
  if (fileQueue.length === 0) $('file-list-wrap').style.display = 'none';
}

function clearFiles() {
  fileQueue = [];
  results   = [];
  $('file-list').innerHTML = '';
  $('file-list-wrap').style.display = 'none';
  $('results-section').style.display = 'none';
  refreshUI();
  setStatus('');
}

function refreshFileCount() {
  $('file-count-label').textContent = fileQueue.length + (fileQueue.length === 1 ? ' file' : ' files');
}

function refreshUI() {
  $('process-btn').disabled = fileQueue.length === 0;
}

function setFileStatus(id, text, cls) {
  const el = $('fstatus-' + id);
  if (!el) return;
  el.textContent = text;
  el.className   = 'fi-status ' + cls;
}

// ── Event wiring ─────────────────────────────────────────────────────────────
$('file-input').addEventListener('change', e => {
  handleFiles(Array.from(e.target.files));
  e.target.value = ''; // allow re-selecting same files
});

const dz = $('drop-zone');
['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag-over'); }));
['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag-over'); }));
dz.addEventListener('drop', e => { handleFiles(Array.from(e.dataTransfer.files)); });

document.querySelectorAll('.label-option').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.label-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    opt.querySelector('input[type="radio"]').checked = true;
  });
});
document.querySelectorAll('.sens-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.sens-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    const val = opt.querySelector('input').value;
    opt.querySelector('input').checked = true;
    $('sens-hint').textContent = HINTS[val];
  });
});
$('padding-range').addEventListener('input', e => { $('padding-val').textContent = e.target.value + ' mm'; });

// ── Main process ─────────────────────────────────────────────────────────────
$('process-btn').addEventListener('click', async () => {
  if (!fileQueue.length) return;
  $('process-btn').disabled = true;
  $('results-section').style.display = 'none';
  results = [];
  setStatus('');

  const progressWrap = $('progress-wrap');
  progressWrap.classList.add('active');

  const total = fileQueue.length;
  let done = 0;

  function setProgress(n, label) {
    $('progress-fill').style.width = Math.round((n / total) * 100) + '%';
    $('progress-label').textContent = label;
  }

  try {
    for (const item of fileQueue) {
      setFileStatus(item.id, 'Working…', 'working');
      setProgress(done, `Processing ${item.file.name} (${done + 1}/${total})`);
      try {
        const result = await processOne(item.file);
        results.push(result);
        setFileStatus(item.id, '✓ Done', 'done');
      } catch (err) {
        console.error(item.file.name, err);
        setFileStatus(item.id, '✗ Error', 'error');
        results.push({ name: item.file.name, blob: null, canvas: null, info: 'Error: ' + err.message });
      }
      done++;
      setProgress(done, `Done ${done}/${total}`);
    }

    buildResultsUI();
    setStatus(`✓ Processed ${results.filter(r => r.blob).length} of ${total} labels.`);
  } catch (err) {
    setStatus('Unexpected error: ' + err.message, true);
  } finally {
    $('process-btn').disabled = false;
    progressWrap.classList.remove('active');
  }
});

// ── Process a single PDF ──────────────────────────────────────────────────────
async function processOne(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdfDoc   = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page     = await pdfDoc.getPage(1);
  const viewport = page.getViewport({ scale: RENDER_SCALE });

  const srcCanvas = document.createElement('canvas');
  srcCanvas.width  = viewport.width;
  srcCanvas.height = viewport.height;
  const srcCtx = srcCanvas.getContext('2d');
  srcCtx.fillStyle = 'white';
  srcCtx.fillRect(0, 0, srcCanvas.width, srcCanvas.height);
  await page.render({ canvasContext: srcCtx, viewport }).promise;

  const sensKey = document.querySelector('input[name="sensitivity"]:checked').value;
  const sens    = SENSITIVITY[sensKey];
  const imgData = srcCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
  const raw     = getContentBounds(imgData, srcCanvas.width, srcCanvas.height, sens.threshold);
  if (!raw) throw new Error('Could not detect label content.');

  const ex = sens.expandPx;
  const bounds = {
    x: Math.max(0, raw.x - ex),
    y: Math.max(0, raw.y - ex),
    w: Math.min(srcCanvas.width  - Math.max(0, raw.x - ex), raw.w + ex * 2),
    h: Math.min(srcCanvas.height - Math.max(0, raw.y - ex), raw.h + ex * 2),
  };

  const sizeKey    = document.querySelector('input[name="size"]:checked').value;
  const target     = LABEL_SIZES[sizeKey];
  const padding    = parseFloat($('padding-range').value);
  const autoRotate = $('chk-rotate').checked;

  const outW   = Math.round(target.w * PX_PER_MM);
  const outH   = Math.round(target.h * PX_PER_MM);
  const padPx  = padding * PX_PER_MM;
  const avW    = outW - padPx * 2;
  const avH    = outH - padPx * 2;
  const cw     = bounds.w;
  const ch     = bounds.h;

  const scaleNorm = Math.min(avW / cw, avH / ch);
  const scaleRot  = Math.min(avW / ch, avH / cw);
  const doRotate  = autoRotate && (scaleRot > scaleNorm);

  const outCanvas = document.createElement('canvas');
  outCanvas.width  = outW;
  outCanvas.height = outH;
  const outCtx = outCanvas.getContext('2d');
  outCtx.fillStyle = 'white';
  outCtx.fillRect(0, 0, outW, outH);

  if (!doRotate) {
    const dw = cw * scaleNorm, dh = ch * scaleNorm;
    const dx = padPx + (avW - dw) / 2, dy = padPx + (avH - dh) / 2;
    outCtx.drawImage(srcCanvas, bounds.x, bounds.y, cw, ch, dx, dy, dw, dh);
  } else {
    const dw = ch * scaleRot, dh = cw * scaleRot;
    const dx = padPx + (avW - dw) / 2, dy = padPx + (avH - dh) / 2;
    const cx = dx + dw / 2, cy = dy + dh / 2;
    outCtx.save();
    outCtx.translate(cx, cy);
    outCtx.rotate(Math.PI / 2);
    outCtx.drawImage(srcCanvas, bounds.x, bounds.y, cw, ch, -dh / 2, -dw / 2, dh, dw);
    outCtx.restore();
  }

  // Build per-file PDF blob
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({
    orientation: target.w >= target.h ? 'landscape' : 'portrait',
    unit: 'mm',
    format: [target.w, target.h],
  });
  doc.addImage(outCanvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, target.w, target.h);
  const blob = doc.output('blob');

  const info = `${target.w} × ${target.h} mm  •  ${sensKey}` + (doRotate ? '  •  rotated 90°' : '');
  return { name: file.name, blob, canvas: outCanvas, info };
}

// ── Build results UI ──────────────────────────────────────────────────────────
let activeTab = 0;

function buildResultsUI() {
  const section = $('results-section');
  section.style.display = 'block';

  const tabs  = $('preview-tabs');
  tabs.innerHTML = '';
  activeTab = 0;

  const good = results.filter(r => r.blob);

  results.forEach((r, i) => {
    const tab = document.createElement('button');
    tab.className = 'preview-tab' + (i === 0 ? ' active' : '');
    tab.textContent = shortName(r.name, 18);
    tab.title = r.name;
    if (!r.blob) { tab.style.opacity = '0.4'; tab.style.cursor = 'default'; }
    tab.addEventListener('click', () => {
      if (!r.blob) return;
      activeTab = i;
      document.querySelectorAll('.preview-tab').forEach((t, j) => t.classList.toggle('active', j === i));
      showPreview(r);
    });
    tabs.appendChild(tab);
  });

  if (results[0] && results[0].blob) showPreview(results[0]);

  // Download buttons
  if (good.length === 1) {
    $('dl-single-wrap').style.display = 'block';
    $('dl-multi-wrap').style.display  = 'none';
    $('dl-single-btn').onclick = () => downloadBlob(good[0].blob, good[0].name.replace('.pdf','') + '_label.pdf');
  } else if (good.length > 1) {
    $('dl-single-wrap').style.display = 'none';
    $('dl-multi-wrap').style.display  = 'block';
    $('dl-combined-btn').onclick = () => downloadCombined(good);
    $('dl-separate-btn').onclick = () => downloadSeparateZip(good);
  }
}

function showPreview(result) {
  const previewCanvas = $('preview-canvas');
  const maxP = 420;
  const ps = Math.min(maxP / result.canvas.width, maxP / result.canvas.height, 1);
  previewCanvas.width  = Math.round(result.canvas.width  * ps);
  previewCanvas.height = Math.round(result.canvas.height * ps);
  previewCanvas.getContext('2d').drawImage(result.canvas, 0, 0, previewCanvas.width, previewCanvas.height);
  $('preview-info').textContent = result.info;
}

// ── Download helpers ──────────────────────────────────────────────────────────
function downloadBlob(blob, filename) {
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url; link.download = filename; link.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

async function downloadCombined(good) {
  const btn = $('dl-combined-btn');
  btn.disabled = true; btn.textContent = 'Building…';
  try {
    const sizeKey = document.querySelector('input[name="size"]:checked').value;
    const target  = LABEL_SIZES[sizeKey];
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({
      orientation: target.w >= target.h ? 'landscape' : 'portrait',
      unit: 'mm',
      format: [target.w, target.h],
    });
    good.forEach((r, i) => {
      if (i > 0) doc.addPage([target.w, target.h], target.w >= target.h ? 'landscape' : 'portrait');
      doc.addImage(r.canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, target.w, target.h);
    });
    downloadBlob(doc.output('blob'), 'labels_combined.pdf');
  } finally {
    btn.disabled = false; btn.textContent = 'Combined PDF';
  }
}

async function downloadSeparateZip(good) {
  const btn = $('dl-separate-btn');
  btn.disabled = true; btn.textContent = 'Zipping…';
  try {
    const zip = new JSZip();
    good.forEach(r => {
      const filename = r.name.replace('.pdf','') + '_label.pdf';
      zip.file(filename, r.blob);
    });
    const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
    downloadBlob(zipBlob, 'labels_separate.zip');
  } finally {
    btn.disabled = false; btn.textContent = 'Separate ZIPs';
  }
}

// ── Utility ───────────────────────────────────────────────────────────────────
function getContentBounds(imgData, w, h, threshold) {
  const d = imgData.data;
  let minX = w, minY = h, maxX = 0, maxY = 0, found = false;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 4;
      if (d[i+3] < 10) continue;
      const lum = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
      if (lum < threshold) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
        found = true;
      }
    }
  }
  if (!found) return null;
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function shortName(name, max) {
  if (name.length <= max) return name;
  return name.slice(0, max - 1) + '…';
}
