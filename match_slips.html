<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Match Slip Printer</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/barcodes/JsBarcode.code128.min.js"></script>
  <style>
    /* ── Theme tokens ── */
    :root {
      --bg:            #f1f5f9;
      --surface:       #ffffff;
      --surface-muted: #f8fafc;
      --border:        #e2e8f0;
      --border-strong: #cbd5e1;
      --text:          #0f172a;
      --text-muted:    #64748b;
      --text-subtle:   #94a3b8;
      --primary:       #5c6bc0;
      --primary-hover: #4a58a8;
      --primary-fg:    #ffffff;
      --danger:        #b91c1c;
      --sel-bg:        #f0f1ff;
      --sel-border:    #5c6bc0;
    }
    [data-theme="dark"] {
      --bg:            #0d1117;
      --surface:       #161b22;
      --surface-muted: #0d1117;
      --border:        #30363d;
      --border-strong: #484f58;
      --text:          #c9d1d9;
      --text-muted:    #8b949e;
      --text-subtle:   #6e7681;
      --primary:       #818cf8;
      --primary-hover: #6366f1;
      --primary-fg:    #ffffff;
      --danger:        #f85149;
      --sel-bg:        #1e1f3a;
      --sel-border:    #818cf8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Nav bar ── */
    .nav-bar {
      height: 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-bar a {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-bar a:hover { color: var(--text); background: var(--surface-muted); }
    .nav-bar .sep { color: var(--border-strong); font-size: 13px; }
    .nav-bar .current { font-size: 13px; font-weight: 600; color: var(--text); }
    .nav-bar .spacer { flex: 1; }
    .nav-bar-right { display: flex; align-items: center; gap: 8px; }

    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px 9px;
      font-size: 13px;
      line-height: 1.4;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-btn:hover { border-color: var(--border-strong); color: var(--text); }

    .nav-btn {
      padding: 5px 14px;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: var(--primary-hover); }
    .nav-btn.secondary {
      background: none;
      color: var(--primary);
      border: 1px solid var(--sel-border);
    }
    .nav-btn.secondary:hover { background: var(--sel-bg); }

    /* ── Upload screen ── */
    .upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }
    .upload-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      width: 100%;
      max-width: 520px;
    }
    .upload-card h1 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }
    .upload-card .subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .drop-zone {
      border: 1px dashed var(--border-strong);
      border-radius: 6px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface-muted);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--sel-border);
      background: var(--sel-bg);
    }
    .drop-zone svg { color: var(--text-subtle); margin-bottom: 8px; }
    .drop-zone p { color: var(--text-muted); font-size: 13px; }
    .drop-zone span.hl { color: var(--primary); font-weight: 600; }
    .drop-zone .sub { font-size: 12px; color: var(--text-subtle); margin-top: 4px; }
    #file-input { display: none; }

    .error-msg {
      margin-top: 12px;
      padding: 10px 14px;
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--danger) 30%, var(--border));
      border-radius: 6px;
      color: var(--danger);
      font-size: 13px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Preview screen ── */
    .preview-screen { display: none; }

    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .slip-count { font-size: 13px; color: var(--text-muted); }
    .preview-toolbar .spacer { flex: 1; }

    .slip-list-screen {
      display: flex;
      /* flex-direction: column; */
      /* width: 20px; */
      flex-wrap: wrap;
      /* align-items: center; */
      padding: 300px 16px;
      /* gap: 700px; */
      /* gap: -1400px; */
      grid-gap: 0;
    }

    /* ── Slip wrapper ── */
    /*
     * Slips are rotated 90deg so they read along the long (209mm) axis of
     * the label. On screen this is just a visual rotation; for print, the
     * exact scale needed to fit each slip to the 62mm label is computed
     * dynamically in JS (see updatePrintScale()) and applied via the
     * --print-scale variable, so this isn't tied to one fixed slip size.
     */
    .slip-wrapper {
      display: flow-root;
      page-break-after: always;
      break-after: page;
      transform: rotate(90deg);
      /* border-left: 40px white solid; */
      /* margin-right: -450px; adjust until gap disappears */
      /* padding-left: 50px; */
      /* padding-right: 50px; */
    }
    .slip-wrapper:last-child {
      page-break-after: auto;
      break-after: auto;
    }

    @media screen {
      .slip-wrapper {
        margin-right: -450px; /* tweak as needed */
      }
    }

    /* ── Print setup ── */
    @page {
      size: 62mm 209mm;
      margin: 0;
    }

    @media print {
      .nav-bar,
      .upload-screen,
      .preview-toolbar { display: none !important; }

      body { background: white !important; }

      .preview-screen { display: block !important; }

      .slip-list-screen {
        padding: 0;
        display: block;
      }

      /*
       * Each .slip-wrapper becomes one physical 62mm x 209mm label page.
       * The table itself (not the wrapper) is rotated and scaled, so the
       * wrapper can act as a normal flex box that centers it perfectly
       * regardless of the slip's actual on-page rendered size.
       *
       * --print-scale is computed in JS (see updatePrintScale()) from the
       * slip's real rendered dimensions, so this works for any slip size —
       * no more hardcoded zoom values or guessed negative margins.
       */
      .slip-wrapper {
        margin: 0;
        transform: none;
        width: 62mm;
        height: 209mm;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .slip-wrapper > table.match_slip {
        transform: rotate(90deg) scale(var(--print-scale, 1));
        transform-origin: center center;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html">📦 Label Resizer</a>
    <span class="sep">›</span>
    <span class="current">🏓 Match Slip Printer</span>
    <span class="spacer"></span>
    <div class="nav-bar-right">
      <button class="nav-btn secondary" id="btn-new-file" style="display:none" onclick="resetToUpload()">← New file</button>
      <button class="nav-btn" id="btn-print" style="display:none" onclick="window.print()">🖨 Print</button>
      <button class="theme-btn" id="theme-toggle" title="Toggle theme">
        <span id="theme-icon">☾</span>
      </button>
    </div>
  </nav>

  <!-- Upload screen -->
  <div class="upload-screen" id="upload-screen">
    <div class="upload-card">
      <h1>🏓 Match Slip Printer</h1>
      <p class="subtitle">Upload your match slip HTML export — each slip prints as a 62 mm label</p>

      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5
               a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625
               c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75
               c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <p><span class="hl">Click to upload</span> or drag &amp; drop</p>
        <p class="sub">HTML match slip file (e.g. eematch_slips.html)</p>
      </div>
      <input type="file" id="file-input" accept=".html,.htm,text/html" />

      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <!-- Preview/print screen -->
  <div class="preview-screen" id="preview-screen">
    <div class="preview-toolbar">
      <span class="slip-count" id="slip-count"></span>
      <span class="spacer"></span>
    </div>
    <div class="slip-list-screen" id="slip-list"></div>
  </div>

<script>
/* ── Theme toggle ── */
(function () {
  const html = document.documentElement;
  const btn  = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    icon.textContent = theme === 'dark' ? '☀' : '☾';
    try { localStorage.setItem('theme', theme); } catch (_) { /* ignore: private browsing or storage full */ }
  }

  function saved() { try { return localStorage.getItem('theme'); } catch (_) { return null; /* private browsing */ } }

  applyTheme(saved() || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));

  btn.addEventListener('click', () => {
    applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
})();

/* ── File input / drag-drop ── */
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const errorMsg  = document.getElementById('error-msg');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
  fileInput.value = '';
});

function loadFile(file) {
  if (!file.name.match(/\.html?$/i) && file.type && !file.type.includes('html')) {
    showError('Please upload an HTML file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => processHTML(e.target.result);
  reader.onerror = () => showError('Could not read the file.');
  reader.readAsText(file);
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function resetToUpload() {
  document.getElementById('upload-screen').style.display = '';
  document.getElementById('preview-screen').style.display = 'none';
  document.getElementById('btn-new-file').style.display = 'none';
  document.getElementById('btn-print').style.display = 'none';
  errorMsg.classList.remove('visible');
  document.getElementById('slip-list').innerHTML = '';
  /* Remove previously injected styles from the uploaded file */
  const old = document.getElementById('imported-styles');
  if (old) old.remove();
}

/* ── HTML processing ── */
function processHTML(html) {
  errorMsg.classList.remove('visible');

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  const slipTables = doc.querySelectorAll('table.match_slip');
  if (!slipTables.length) {
    showError('No match slips found in this file. Make sure you uploaded the correct match slip HTML export.');
    return;
  }

  /* Inject original styles (minus @page — we provide our own) */
  const rawCSS = Array.from(doc.querySelectorAll('style'))
    .map(s => s.textContent)
    .join('\n');
  const cleanCSS = rawCSS
    /*
     * Strip @page rules — we define our own 62mm auto page.
     * Strip bare body rules — they would override our chrome styles.
     * Note: these regexes handle the simple single-block patterns used by
     * standard match slip exports; deeply nested or multi-line rules are
     * left in place (harmless, as no such rules appear in typical exports).
     */
    .replace(/@page\b[^{]*\{[^}]*\}/gi, '')
    .replace(/(?:^|[\s;}])body\s*\{[^}]*\}/gi, '');

  const styleEl = document.createElement('style');
  styleEl.id = 'imported-styles';
  styleEl.textContent = cleanCSS;
  document.head.appendChild(styleEl);

  /* Build slip wrappers preserving the original table HTML verbatim */
  const list = document.getElementById('slip-list');
  list.innerHTML = Array.from(slipTables)
    .map(t => `<div class="slip-wrapper">${t.outerHTML}</div>`)
    .join('');

  /* Initialise barcodes from the barcode-placeholder elements */
  list.querySelectorAll('.barcode-placeholder').forEach(el => {
    const value = el.dataset.barcode;
    if (value && value.trim()) {
      el.innerHTML =
        `<svg class="barcode"` +
        ` jsbarcode-format="CODE128"` +
        ` jsbarcode-value="${escAttr(value.trim())}"` +
        ` jsbarcode-width="2" jsbarcode-height="25"` +
        ` jsbarcode-padding="0" jsbarcode-margin="0"` +
        ` jsbarcode-displayvalue="false"></svg>`;
    }
  });
  if (typeof JsBarcode === 'function') {
    try { JsBarcode('#slip-list .barcode').init(); } catch (e) { console.warn('JsBarcode error:', e); }
  }

  const count = slipTables.length;
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('preview-screen').style.display = 'block';
  document.getElementById('btn-new-file').style.display = '';
  document.getElementById('btn-print').style.display = '';
  document.getElementById('slip-count').textContent =
    `${count} slip${count !== 1 ? 's' : ''} loaded`;

  /* Wait a frame so layout (incl. barcodes) has settled before measuring */
  requestAnimationFrame(() => requestAnimationFrame(updatePrintScale));
}

/*
 * ── Print scaling ──
 * Each slip is rotated 90deg for print and needs to be scaled to exactly
 * fill a 62mm x 209mm label. Rather than relying on a hardcoded zoom value
 * (which only works for one fixed slip size), this measures each slip's
 * actual on-screen footprint — which already reflects the rotate(90deg)
 * applied to .slip-wrapper for screen display — and computes the scale
 * factor that fits it to the label, leaving a small safety margin so
 * nothing prints flush against the label edge. The result is written as a
 * --print-scale CSS variable on each .slip-wrapper, consumed by the
 * @media print rule that rotates+scales the table itself.
 */
function updatePrintScale() {
  const PAGE_WIDTH_MM   = 62;
  const PAGE_HEIGHT_MM  = 209;
  const SAFE_MARGIN_MM  = 2; /* inset on each side; set to 0 to fill the label edge-to-edge */
  const mmToPx = mm => (mm * 96) / 25.4;

  const maxWidthPx  = mmToPx(PAGE_WIDTH_MM  - SAFE_MARGIN_MM * 2);
  const maxHeightPx = mmToPx(PAGE_HEIGHT_MM - SAFE_MARGIN_MM * 2);

  document.querySelectorAll('.slip-wrapper').forEach(wrapper => {
    const table = wrapper.querySelector('table.match_slip');
    if (!table) return;

    /* This rect already includes the wrapper's rotate(90deg), so its
       width/height are the slip's rotated footprint at scale 1. */
    const rect = table.getBoundingClientRect();
    if (!rect.width || !rect.height) return;

    const scale = Math.min(maxWidthPx / rect.width, maxHeightPx / rect.height);
    if (Number.isFinite(scale) && scale > 0) {
      wrapper.style.setProperty('--print-scale', scale.toFixed(4));
    }
  });
}

/* Recompute right before the browser builds the print job, in case fonts
   or images finished loading late and shifted slip dimensions slightly. */
window.addEventListener('beforeprint', updatePrintScale);

function escAttr(str) {
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
